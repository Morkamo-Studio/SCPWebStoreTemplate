<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>SCP:SL Web Store Template</title>
</head>
<body>
    <div class="header-box">
        <div class="header-content">
            <div class="header-content-logo-box">
                <img src="assets/images/web_site-logo.png" alt="web_site-logo" class="web-site-logo">
                <div class="header-content-logo-text">
                    <p class="header-content-logo-text-letter">S</p>
                    <p class="header-content-logo-text-letter">T</p>
                    <p class="header-content-logo-text-letter">A</p>
                    <p class="header-content-logo-text-letter">R</p>
                    <p class="header-content-logo-text-space"></p>
                    <p class="header-content-logo-text-letter">N</p>
                    <p class="header-content-logo-text-letter">O</p>
                    <p class="header-content-logo-text-letter">V</p>
                    <p class="header-content-logo-text-letter">A</p>
                </div>
            </div>
            <div class="header-content-navigation">
                <a href="#about-us">О нас</a>
                <button class="authButton">Авторизация</button>
            </div>
        </div>
    </div>
    <div class="products-box">
        <div class="product-box-title">
            <p>Привилегии</p>
        </div>
        <div class="product-box-content">
            <div class="product-card" style="--product-glow-color: 0, 255, 51;">
                <div class="product-card-content">
                    <img src="assets/images/safe-logo.png" alt="donate-safe-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>SAFE</p>
                        <p>199 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 255, 191, 0;">
                <div class="product-card-content">
                    <img src="assets/images/euclid-logo.png" alt="donate-euclid-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>EUCLID</p>
                        <p>399 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 255, 0, 0; --product-glow-intensity: 1">
                <div class="product-card-content">
                    <img src="assets/images/keter-logo.png" alt="donate-keter-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>KETER</p>
                        <p>599 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 130, 130, 130; --product-glow-intensity: 1">
                <div class="product-card-content">
                    <img src="assets/images/thaumiel-logo.png" alt="donate-thaumiel-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>THAUMIEL</p>
                        <p>799 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 191, 20, 255; --product-glow-intensity: 1">
                <div class="product-card-content">
                    <img src="assets/images/unban-logo.png" alt="donate-unban-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>РАЗБАН</p>
                        <p>499 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 168, 46, 89; --product-glow-intensity: 1">
                <div class="product-card-content">
                    <img src="assets/images/unmute-logo.png" alt="donate-unmute-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p>РАЗМЬЮТ</p>
                        <p>199 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
            <div class="product-card" style="--product-glow-color: 75, 180, 235; --product-glow-intensity: 1">
                <div class="product-card-content">
                    <img src="assets/images/white_list-logo.png" alt="donate-white-list-logo" class="product-card-image">
                    <div class="product-card-description">
                        <p style="font-size: 22px;">РЕЗЕРВНЫЙ СЛОТ</p>
                        <p>99 K</p>
                    </div>
                    <button class="button-buy-product">Купить</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-box">
        <div class="footer-box-content">
            <div class="footer-box-content-left-part">
                <p>© 2026 Morkamo Studio</p>
                <p>Все права защищены</p>
            </div>
            <div class="footer-box-content-right-part">
                <p><a href="#terms-condition">Пользовательское соглашение</a></p>
                <p><a href="https://github.com/Morkamo" target="_blank">Дизайн разработал Mercury Morkamo</a></p>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
